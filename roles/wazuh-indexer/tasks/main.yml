---

- import_tasks: certs_setup.yml
  when:
    - generate_certs

- import_tasks: RedHat.yml
  when: ansible_os_family == 'RedHat'

- import_tasks: Debian.yml
  when: ansible_os_family == 'Debian'

- name: Linux CentOS/RedHat | Install wazuh-indexer using yum
  yum:
    name: "{{ wazuh_indexer_package_download_path }}/{{ wazuh_indexer_package_name }}"
    state: present
    disable_gpg_check: yes
  when:
    - ansible_os_family|lower == "redhat"

- name: Linux Debian | Install wazuh-indexer using dpkg
  shell: |
    dpkg -i {{ wazuh_indexer_package_download_path }}/{{ wazuh_indexer_package_name }}
  when:
    - ansible_os_family|lower != "redhat"

- name: Copy Opensearch Configuration File
  template:
    src: "templates/opensearch.yml.j2"
    dest: "/etc/wazuh-indexer/opensearch.yml"
    owner: root
    group: wazuh-indexer
    mode: 0640
    force: yes
  vars:
    indexer_network_host: "{{ hostvars[inventory_hostname]['private_ip'] }}"
  tags: install

# - name: Configure Wazuh indexer JVM memmory.
#   template:
#     src: "templates/jvm.options.j2"
#     dest: "/etc/wazuh-indexer/jvm.options"
#     owner: root
#     group: wazuh-indexer
#     mode: 0644
#     force: yes
#   notify: restart wazuh-indexer
#   tags: install

- name: Reload systemd configuration
  systemd:
    daemon_reload: yes
  become: yes

- name: Ensure Wazuh indexer started and enabled
  service:
    name: wazuh-indexer
    enabled: true
    state: started

- name: Initialize Wazuh Indexer cluster
  shell: |
    /usr/share/wazuh-indexer/bin/indexer-security-init.sh
  args:
    executable: /bin/bash
  become: yes

- name: Wait for Wazuh indexer API (Private IP)
  uri:
    url: "https://{{ hostvars[inventory_hostname]['private_ip'] if not single_node else indexer_network_host }}:{{ indexer_http_port }}/_cat/health/"
    user: "admin" # Default Indexer user is always "admin"
    password: "{{ indexer_admin_password }}"
    validate_certs: no
    status_code: 200,401
    return_content: yes
    timeout: 4
  register: _result
  until:
    - _result is defined
    - '"green" in _result.content or ( "yellow" in _result.content and single_node )'
  retries: 24
  delay: 5
  tags: debug
  when:
    - hostvars[inventory_hostname]['private_ip'] is defined and hostvars[inventory_hostname]['private_ip']

- import_tasks: "RMRedHat.yml"
  when: ansible_os_family == "RedHat"

- name: Reload systemd configuration
  systemd:
    daemon_reload: true
  become: yes
  notify: restart wazuh-indexer
